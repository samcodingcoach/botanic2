<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Room List Light Mode</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#1791cf",
                        "background-light": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light font-display text-slate-900 min-h-screen">
    <div class="relative flex h-full min-h-screen w-full flex-col bg-background-light overflow-x-hidden">
        <div
            class="flex items-center bg-white/80 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-50 border-b border-slate-200">
            <div class="text-slate-900 flex size-12 shrink-0 items-center cursor-pointer">
                <span class="material-symbols-outlined text-2xl font-bold">arrow_back</span>
            </div>
            <h2 class="text-slate-900 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">
                <!-- {nama_cabang} -->
            </h2>
            <div class="flex w-12 items-center justify-end">
                <button
                    class="flex cursor-pointer items-center justify-center rounded-xl h-12 bg-transparent text-slate-900 p-0">
                    <span class="material-symbols-outlined text-2xl font-bold">search</span>
                </button>
            </div>
        </div>
        <main class="flex-1 pb-24 px-4 space-y-6 mt-4">
            <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-md">
                <div class="w-full aspect-[16/9] bg-center bg-no-repeat bg-cover" style='background-image: url("");'>
                    <!-- url gambar -->
                </div>
                <div class="p-5 space-y-3">
                    <div class="flex justify-between items-start">
                        <div>

                            <h3 class="text-xl font-bold text-slate-900"><!-- {nama_tipe} --> </h3>
                            <p class="text-slate-500 text-sm mt-1"><!-- {keterangan} --></p>
                        </div>
                        <span
                            class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">Most
                            Popular</span>
                    </div>
                    <p class="text-slate-600 text-sm leading-relaxed">
                        <!-- {keterangan(1)} -->
                    </p>
                    <div class="pt-2 border-t border-slate-50">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">
                            <!-- {link_youtube} -->
                        </p>
                        <div
                            class="relative aspect-video w-full rounded-xl overflow-hidden bg-slate-100 group cursor-pointer border border-slate-200">
                            <div class="absolute inset-0 bg-cover bg-center"
                                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDwk2RvsjqTdYCJRUwac9Vs-U7im0j13PD73c0pRe37noZy3nOIeyh7DIhL5sLYrBNAuErvLoOn0gJFjLv0-GZqgTf4GfSCSzth5EdN4CWQ9ckoaffryPLaxGxAuIFkLKWmmefitAII34VBm_KPXFt3MDbWkYKk2AxkU7wv7ZEkRQsqoJt1Uv8CEzTcPVSX4c65zF4Bah3rYUVKLC8n4O6vOcxYgmTI4RHK3Qc_10Sg95kHlveIYDh8caWN8Pn7ochEnPBODwak_WXw"); opacity: 0.9;'>
                            </div>


                        </div>
                    </div>
                </div>
            </div>

        </main>
        <!-- Bottom Navigation Bar -->


        <div
            class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-200 px-2 py-2 flex items-center justify-around z-50">
            <button class="flex flex-col items-center gap-1 p-2 text-primary">
                <span class="material-symbols-outlined text-[26px] fill-1">bed</span>
                <span class="text-[10px] font-semibold">Room</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <span class="material-symbols-outlined text-[26px]">pool</span>
                <span class="text-[10px] font-medium">Facility</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <span class="material-symbols-outlined text-[26px]">concierge</span>
                <span class="text-[10px] font-medium">Receptionist</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <span class="material-symbols-outlined text-[26px]">cleaning_services</span>
                <span class="text-[10px] font-medium">Housekeeping</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400">
                <span class="material-symbols-outlined text-[26px]">more_horiz</span>
                <span class="text-[10px] font-medium">More</span>
            </button>
        </div>
    </div>

</body>

</html>
