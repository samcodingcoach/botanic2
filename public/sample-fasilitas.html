<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hotel Facilities</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script>
        // Slider navigation function
        function slideImage(sliderId, direction) {
            const slider = document.getElementById(sliderId);
            const scrollAmount = slider.offsetWidth;
            slider.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        // Open image preview modal
        function openImagePreview(imageUrl, altText) {
            const modal = document.getElementById('image-preview-modal');
            const modalImage = document.getElementById('modal-image');
            const modalAlt = document.getElementById('modal-alt');

            modalImage.style.backgroundImage = `url("${imageUrl}")`;
            modalAlt.textContent = altText || '';
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Close image preview modal
        function closeImagePreview() {
            const modal = document.getElementById('image-preview-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
        <!-- Header -->
        <div
            class="flex items-center bg-white/80 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-50 border-b border-slate-200">
            <div class="text-slate-900 flex size-12 shrink-0 items-center cursor-pointer">
                <span class="material-symbols-outlined text-2xl font-bold">arrow_back</span>
            </div>
            <h2 class="text-slate-900 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">
                <!-- {nama_cabang} --> Facilities
            </h2>
            <div class="flex w-12 items-center justify-end">
                <button
                    class="flex cursor-pointer items-center justify-center rounded-xl h-12 bg-transparent text-slate-900 p-0">
                    <span class="material-symbols-outlined text-2xl font-bold">search</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="flex-1 pb-24 space-y-6 mt-4">
            <!-- Facility Card 1 -->
            <div
                class="bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm border border-slate-100 dark:border-slate-800 mx-4">
                <!-- Image Slider with Navigation -->
                <div class="relative overflow-hidden h-52 group">
                    <div id="slider-1"
                        class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar h-full scroll-smooth">
                        <div class="min-w-full h-full snap-start relative">
                            <div class="w-full h-full bg-center bg-cover cursor-pointer"
                                data-alt="Luxury blue infinity pool overlooking ocean"
                                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD6FKMiYLev_GdPvaVuKBwDiPEXYQmnavmC5Ar2m2d42LzxNLWClaAcj88_wcTNZBQgSJiZ-4p0rBSWljP0hdN2WVC5ZuD8k7D-wjmS3ax_ep_VbxtLz-rUulZ4BT-vpvEW5N7gmhX1ghGxcEdjpq9A8Rt8AQwYXeIhk6U8POJI-ZPlYjc-JKE2mdP_iOH8oD16quinMIwD2iA10fipDCHTFFWIfhI3tKWDjGGNlaJiQd4y1LtR0udL0_HJfoMg3uANPl3P71u3A588");'
                                onclick="openImagePreview(this.style.backgroundImage.slice(5, -2), this.dataset.alt)">
                            </div>
                        </div>
                        <div class="min-w-full h-full snap-start relative">
                            <div class="w-full h-full bg-center bg-cover cursor-pointer"
                                data-alt="Close up of pool lounge chairs"
                                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAlDri97GW3T-3zDYSkAO9OE2fyODiAy3PWxz1ambDMVbDUmIe8bnpXEhG2c4lEx2TF4BFiHPp7_PG0VZQNxPKDEeBm3k4ZX-_AD-Hm8eQBUqwPXg_LBcOsEyTUA0kP2eBraISakYvqNJnP03Au5qtWkfqCG82qElhXoHzAlho6JjHv912wymB328vXR3kYGdHMXAA-T8dJ5UYD7aZaQ6NwdxyYPapk2c9U8tyfUraq_N-ixOHzAAYdu8HIs7rnDnsp6Y_ayuRIgfDl");'
                                onclick="openImagePreview(this.style.backgroundImage.slice(5, -2), this.dataset.alt)">
                            </div>
                        </div>
                    </div>
                    <!-- Slider Navigation Buttons -->
                    <button onclick="slideImage('slider-1', -1)"
                        class="absolute left-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-slate-900/50 dark:bg-slate-900/50 backdrop-blur-sm hover:bg-slate-900/70 transition-all">
                        <span class="material-symbols-outlined text-white">chevron_left</span>
                    </button>
                    <button onclick="slideImage('slider-1', 1)"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-slate-900/50 dark:bg-slate-900/50 backdrop-blur-sm hover:bg-slate-900/70 transition-all">
                        <span class="material-symbols-outlined text-white">chevron_right</span>
                    </button>
                    <!-- Slider Dots Indicator -->
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-white shadow-md"></span>
                        <span class="w-2 h-2 rounded-full bg-white/50 shadow-md"></span>
                    </div>
                </div>
                <!-- Card Content -->
                <div class="p-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-lg font-bold">Infinity Pool</h3>
                        <div class="flex gap-2">
                            <span
                                class="px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 text-[10px] font-bold uppercase tracking-wider">Active</span>
                            <span
                                class="px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400 text-[10px] font-bold uppercase tracking-wider">Free</span>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-4">
                        Enjoy a breathtaking view of the city skyline or the horizon while you swim in our
                        temperature-controlled pool.
                    </p>
                    <button
                        class="w-full py-2.5 bg-primary text-white rounded-lg font-semibold text-sm transition-opacity active:opacity-80">
                        View Details &amp; Schedule
                    </button>
                </div>
            </div>


        </main>

        <!-- Bottom Navigation Bar -->

    </div>

    <!-- Image Preview Modal -->
    <div id="image-preview-modal" class="fixed inset-0 bg-black/95 z-[100] hidden" onclick="closeImagePreview()">
        <div class="relative w-full h-full flex items-center justify-center p-4">
            <!-- Close button -->
            <button onclick="closeImagePreview()"
                class="absolute top-4 right-4 w-12 h-12 flex items-center justify-center rounded-full bg-white/20 backdrop-blur-sm hover:bg-white/30 transition-all z-10">
                <span class="material-symbols-outlined text-white text-3xl">close</span>
            </button>
            <!-- Image -->
            <div id="modal-image" class="max-w-full max-h-full bg-center bg-contain bg-no-repeat"
                style="max-width: 90vw; max-height: 90vh;"></div>
            <!-- Alt text -->
            <p id="modal-alt"
                class="absolute bottom-8 left-1/2 -translate-x-1/2 text-white text-center text-sm font-medium max-w-md">
            </p>
        </div>
    </div>
</body>

</html>
