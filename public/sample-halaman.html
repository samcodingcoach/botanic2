                extend: {

                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",

                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                        "DEFAULT": "0.25rem",

        }

        }

        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
