<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Technician Service</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <div
            class="flex items-center bg-white/80 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-50 border-b border-slate-200">
            <div class="text-slate-900 flex size-12 shrink-0 items-center cursor-pointer">
                <span class="material-symbols-outlined text-2xl font-bold">arrow_back</span>
            </div>
            <h2 class="text-slate-900 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">
                Technician Service
            </h2>
            <div class="flex w-12 items-center justify-end">
                <button
                    class="flex cursor-pointer items-center justify-center rounded-xl h-12 bg-transparent text-slate-900 p-0">
                    <span class="material-symbols-outlined text-2xl font-bold">search</span>
                </button>
            </div>
        </div>


        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-24">
            <div class="px-4 py-4">
                <h2 class="text-xl font-bold mb-2 px-0 text-primary">Available Technicians</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">Contact our technical team for maintenance
                    or repair assistance.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-4">
                <!-- Card 1: Active -->
                <div
                    class="group bg-white dark:bg-slate-900 rounded-xl p-1 transition-all hover:shadow-[0_20px_40px_rgba(0,0,0,0.08)] border border-slate-100 dark:border-slate-800">
                    <div class="p-5 bg-background-light dark:bg-slate-800 rounded-lg h-full">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-12 h-12 rounded-xl bg-blue-200 dark:bg-blue-900 flex items-center justify-center text-blue-500">
                                    <span class="material-symbols-outlined"
                                        style="font-variation-settings: 'FILL' 1;">engineering</span>
                                </div>
                                <div>
                                    <span
                                        class="text-[10px] font-bold text-primary tracking-widest uppercase"><!-- kode_teknisi --></span>
                                    <h3 class="text-lg font-bold leading-none text-slate-900 dark:text-slate-100">
                                        <!-- nama_teknisi --></h3>
                                </div>
                            </div>
                            <span
                                class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase tracking-tighter"><!-- aktif --></span>
                        </div>
                        <div class="space-y-4 mb-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p
                                        class="text-[10px] text-slate-500 dark:text-slate-400/60 font-bold uppercase tracking-wider mb-1">
                                        Job Title</p>
                                    <p class="text-sm font-semibold text-slate-900 dark:text-slate-100"><!-- jabatan -->
                                    </p>
                                </div>
                                <div>
                                    <p
                                        class="text-[10px] text-slate-500 dark:text-slate-400/60 font-bold uppercase tracking-wider mb-1">
                                        Specialization</p>
                                    <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">
                                        <!-- spesialis --></p>
                                </div>
                            </div>
                        </div>
                        <div
                            class="pt-4 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between">
                            <div class="flex items-center gap-2 w-full">
                                <button
                                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg bg-[#25D366] text-white text-xs font-bold hover:opacity-90 transition-opacity">
                                    <span class="material-symbols-outlined text-sm">chat</span>Chat
                                </button>
                                <button
                                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg border border-primary text-primary text-xs font-bold hover:bg-primary/5 transition-colors">
                                    <span class="material-symbols-outlined text-sm">call</span>Call
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Card 2: Inactive -->
                <div
                    class="group bg-white dark:bg-slate-900 rounded-xl p-1 transition-all opacity-60 filter grayscale-[0.3]">
                    <div
                        class="p-5 bg-background-light dark:bg-slate-800 rounded-lg h-full border border-dashed border-slate-300 dark:border-slate-600">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-12 h-12 rounded-xl bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-400 dark:text-slate-500">
                                    <span class="material-symbols-outlined">person_off</span>
                                </div>
                                <div>
                                    <span
                                        class="text-[10px] font-bold text-slate-500 dark:text-slate-400/60 tracking-widest uppercase">TCH-102</span>
                                    <h3 class="text-lg font-bold leading-none text-slate-900 dark:text-slate-100">Siti
                                        Aminah</h3>
                                </div>
                            </div>
                            <span
                                class="px-3 py-1 bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-[10px] font-bold rounded-full uppercase tracking-tighter">Inactive</span>
                        </div>
                        <div class="space-y-4 mb-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p
                                        class="text-[10px] text-slate-500 dark:text-slate-400/60 font-bold uppercase tracking-wider mb-1">
                                        Job Title</p>
                                    <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">Junior
                                        Technician</p>
                                </div>
                                <div>
                                    <p
                                        class="text-[10px] text-slate-500 dark:text-slate-400/60 font-bold uppercase tracking-wider mb-1">
                                        Specialization</p>
                                    <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">Plumbing</p>
                                </div>
                            </div>
                        </div>
                        <div
                            class="pt-4 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between">
                            <div class="flex flex-col gap-2 w-full">
                                <div class="flex items-center gap-2 w-full">
                                    <button
                                        class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 text-xs font-bold cursor-not-allowed"
                                        disabled="">
                                        <span class="material-symbols-outlined text-sm">chat</span>Chat
                                    </button>
                                    <button
                                        class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-400 dark:text-slate-500 text-xs font-bold cursor-not-allowed"
                                        disabled="">
                                        <span class="material-symbols-outlined text-sm">call</span>Call
                                    </button>
                                </div>
                                <span
                                    class="text-[10px] font-bold text-slate-500 dark:text-slate-400/60 italic text-center">Access
                                    Revoked</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</body>

</html>
