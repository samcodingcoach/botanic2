<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: 100dvh;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <div
        class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
        <!-- Header -->

        <!-- Main Content -->
        <main class="flex-1 pb-24 space-y-6 mt-4">
            <!-- Hero Section -->
            <div class="relative rounded-xl overflow-hidden mb-8 h-48 bg-slate-100 dark:bg-slate-800 shadow-sm mx-4">
                <img class="absolute inset-0 w-full h-full object-cover opacity-90"
                    data-alt="sophisticated hotel lobby with marble floors, gold accents, and a minimal concierge desk"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVAa0HzDnJOdh4RpQ8Dr0TGGzFPRu8bDTXnBhy_mD7Q1hD8G5oChMsVN0CK6SDMgSWTV1Jf9GgngjIPcgqSN9wNZ0t05O9GSGRg59S-oijeVbnFC2FqbFjBimfEBekQWN2dbM9aMspRaqnpSjFvlf88x96BFHy09JX6kDrHlV3srPaDkQVUtLOucAeVlQDxVVAsTMjKKIDUlGRvNIfxQg1pE9loN1MhnA3fbSt9_pkZZhzP-93wvxXeKbkR2L_cKOI1ccGtZoDhmiF" />
                <div
                    class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-6">
                    <span class="text-white/80 text-xs uppercase tracking-widest mb-1">Botanic Hotel</span>
                    <h2 class="text-white font-display text-2xl font-bold">Approval of overnight guests</h2>
                </div>
            </div>
            <!-- Tabbed Interface -->
            <nav class="flex space-x-1 bg-slate-100 dark:bg-slate-800 p-1.5 rounded-full mb-8 mx-4">
                <button
                    class="flex-1 py-2 px-4 rounded-full text-sm font-semibold transition-all bg-white text-primary shadow-sm">
                    <!-- {categories}.{label} -->
                </button>
                <button
                    class="flex-1 py-2 px-4 rounded-full text-sm font-semibold transition-all text-slate-500 hover:bg-white/50">
                    <!-- {categories}.{label} -->
                </button>
                <button
                    class="flex-1 py-2 px-4 rounded-full text-sm font-semibold transition-all text-slate-500 hover:bg-white/50">
                    <!-- {categories}.{label} -->
                </button>
            </nav>
            <!-- Section 0: Content -->
            <div class="space-y-4 mx-4">
                <div class="flex items-center gap-3 mb-2">
                    <span class="material-symbols-outlined text-blue-700" data-icon="schedule">schedule</span>
                    <h3 class="font-display font-bold text-lg text-slate-900"><!-- {categories}.{label} 0 --></h3>
                </div>
                <p class="text-sm text-slate-600 dark:text-slate-400 mb-6 leading-relaxed">Please review and acknowledge
                    the timing
                    policies to ensure a smooth transition for all our guests.</p>
                <!-- Checklist Item 1 -->
                <label
                    class="group flex items-start gap-4 p-5 rounded-xl bg-white border border-transparent hover:border-blue-100 transition-all cursor-pointer shadow-sm active:scale-[0.99]">
                    <div class="relative flex items-center pt-1">
                        <input
                            class="peer h-6 w-6 rounded-md border-slate-300 text-blue-700 focus:ring-blue-500 transition-colors"
                            type="checkbox" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <span
                            class="font-semibold text-slate-900 group-hover:text-blue-700 transition-colors"><!-- nama_aturan --></span>
                        <span class="text-sm text-slate-500"><!-- deskripsi --></span>
                    </div>
                </label>

            </div>
            <!-- Info Note -->
            <div class="mt-8 p-4 bg-blue-50 rounded-xl border border-blue-100 flex gap-3 mx-4">
                <span class="material-symbols-outlined text-blue-700 text-xl" data-icon="info">info</span>
                <p class="text-xs text-blue-800 leading-tight">By checking these items, you acknowledge that you have
                    read
                    and understood the residency protocols for this section.</p>
            </div>
        </main>

        <!-- Bottom Navigation Bar -->
        <footer
            class="fixed bottom-0 left-0 w-full bg-white dark:bg-slate-900 rounded-t-2xl z-50 shadow-[0_-8px_24px_rgba(0,0,0,0.06)] border-t border-slate-100 dark:border-slate-800">
            <div class="flex justify-around items-center px-4 py-3">
                <!-- Decline Tab -->
                <button
                    class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-2 hover:opacity-90 active:scale-[0.98] duration-200">
                    <span class="material-symbols-outlined text-2xl mb-1" data-icon="cancel">cancel</span>
                    <span class="text-xs font-semibold">Decline</span>
                </button>
                <!-- I Agree Tab (Active) -->
                <button
                    class="flex flex-col items-center justify-center bg-primary text-white rounded-full px-8 py-3 mx-2 w-full hover:opacity-90 active:scale-[0.98] duration-200">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-xl" data-icon="check_circle"
                            style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        <span class="text-sm font-bold tracking-wide">I Agree</span>
                    </div>
                </button>
            </div>
        </footer>
    </div>
</body>

</html>
