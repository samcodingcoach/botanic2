<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Social Media & Official Pages</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        /* Hide scrollbar for horizontal scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">

        <main class="flex-1 px-4 py-2 space-y-4">

            <section class="mt-8 mb-4">
                <h2 class="text-xl font-bold mb-2 px-0 text-primary">
                    Social Media &amp; Official Pages
                </h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mb-4">Follow our curated journey across all major
                    platforms.</p>
                <div class="space-y-4">
                    <!-- Instagram Row -->
                    <div
                        class="group flex items-center p-4 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 transition-all hover:bg-slate-50 dark:hover:bg-slate-800">
                        <div
                            class="relative w-14 h-14 rounded-lg overflow-hidden flex-shrink-0 bg-slate-100 dark:bg-slate-800">
                            <img alt="Instagram" class="w-full h-full object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR_w-ldAV74_BJe2hUg5YmVQSKgmIVUVO99I7VrZN92DxMvAoLF5sZvowQjQO7ncBdSW7TpW9jPgSgWDY4qHuIlhVh8UCF_EmwfjdQo2YnMBmm-MjzMfEQdBPfCqbLiKX-aNpk9-ZNPAEFGZ258np2bBVcTgP1aO2ygzwQ5-08DQNDEfDWm92Q_d24RfU1sSGz_iEc4MqnhDSAvCnO6yIqm031GWflFb2SPqAV7rV3SOYAdy6HSAZye7s50vm7F9HFaIhGoH-qlePE" />
                        </div>
                        <div class="ml-4 flex-grow">
                            <h3 class="font-semibold text-slate-900 dark:text-slate-100 text-base leading-none mb-1">
                                Instagram</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400">Grand Plaza Hotel</p>
                            <p class="text-xs text-primary font-semibold mt-0.5">@grandplaza_hotel</p>
                        </div>
                        <span
                            class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">chevron_right</span>
                    </div>

                </div>
            </section>
            <!-- Footer Info -->
            <div class="mt-8 text-center pb-4">
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-full">
                    <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
                    <span class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">All accounts are verified</span>
                </div>
            </div>
            <div class="h-20"></div> <!-- Spacer for Bottom Nav -->
        </main>
    </div>
</body>

</html>
